<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="100%" height="100%">
  <rect width="600" height="350" fill="#0f172a" rx="15" />
  <text x="300" y="45" font-family="'Inter', sans-serif" font-size="20" font-weight="bold" fill="#f1f5f9" text-anchor="middle">DOCUMENTATION PORTAL LAYOUT</text>
  
  <rect x="50" y="90" width="140" height="80" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2" />
  <text x="120" y="130" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#38bdf8" text-anchor="middle">1. Fundamentals</text>
  <text x="120" y="150" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">philosophy, installation</text>

  <rect x="230" y="90" width="140" height="80" rx="8" fill="#1e293b" stroke="#0ea5e9" stroke-width="2" />
  <text x="300" y="130" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0ea5e9" text-anchor="middle">2. Architectures</text>
  <text x="300" y="150" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">agent loop, workflows</text>

  <rect x="410" y="90" width="140" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2" />
  <text x="480" y="130" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#10b981" text-anchor="middle">3. Engineering</text>
  <text x="480" y="150" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">coding, tools, vision</text>

  <rect x="140" y="210" width="140" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
  <text x="210" y="250" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#f59e0b" text-anchor="middle">4. Cognition</text>
  <text x="210" y="270" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">reasoning, prompts</text>

  <rect x="320" y="210" width="140" height="80" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
  <text x="390" y="250" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#a855f7" text-anchor="middle">5. Verification</text>
  <text x="390" y="270" font-family="'Inter', sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">evals, examples</text>
