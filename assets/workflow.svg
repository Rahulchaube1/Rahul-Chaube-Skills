  <text x="235" y="130" font-family="'Inter', sans-serif" font-size="14" font-weight="bold" fill="#0ea5e9" text-anchor="middle">1. Plan</text>
  <text x="235" y="150" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Mental checklist</text>

