  <text x="800" y="150" font-family="'Inter', sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Summary &amp; tests</text>
  
  <path d="M655 170 L655 220 L515 220 L515 170" stroke="#f43f5e" stroke-width="2.5" stroke-dasharray="6 4" fill="none" />
  <text x="585" y="210" font-family="'Inter', sans-serif" font-size="11" fill="#f43f5e" text-anchor="middle">Loop on Failure</text>
