name: Auto Labeler

on:
  pull_request_target:
    types: [opened, synchronized]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Apply Auto Labels
    runs-on: ubuntu-latest
    steps:
      - name: Run Labeler Action
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: '.github/labeler.yml'
          sync-labels: true
