name: Auto Assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    name: Auto Assign Maintainer
    runs-on: ubuntu-latest
    steps:
      - name: Auto Assign Creator
        uses: actions/github-script@v7
        with:
          script: |
            const creator = "Rahulchaube1";
            
            // Assign issue
            if (context.payload.issue) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                assignees: [creator]
              });
            }
            
            // Assign PR and request review
            if (context.payload.pull_request) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                assignees: [creator]
              });
              
              // Request review (avoid requesting review from self if creator opened the PR)
              if (context.payload.pull_request.user.login !== creator) {
                await github.rest.pulls.requestReviewers({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  reviewers: [creator]
                });
              }
            }
